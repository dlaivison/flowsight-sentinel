version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowsight
      POSTGRES_USER: flowsight
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flowsight_secure_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsight"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: flowsight
      DB_USER: flowsight
      DB_PASSWORD: ${DB_PASSWORD:-flowsight_secure_2026}
      JWT_SECRET: ${JWT_SECRET:-change_this}
      FORSIGHT_API_URL: ${FORSIGHT_API_URL}
      FORSIGHT_API_KEY: ${FORSIGHT_API_KEY}
      ZAPI_INSTANCE: ${ZAPI_INSTANCE:-}
      ZAPI_TOKEN: ${ZAPI_TOKEN:-}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: sentinel_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "0.0.0.0:3000:80"

volumes:
  postgres_data:
